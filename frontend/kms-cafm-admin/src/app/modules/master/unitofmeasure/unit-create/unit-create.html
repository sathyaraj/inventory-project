<form [formGroup]="form" class="w-full bg-gray-100 p-4 text-sm">

  <!-- HEADER -->
  <div class="bg-white border p-3 mb-3 font-semibold">
    Add / Modify Unit of Measure
  </div>

  <!-- FORM -->
  <div class="bg-white border p-4 space-y-4">

    <!-- Unit -->
    <div class="flex items-center">
      <label class="w-48">Unit of Measure *</label>
      <input formControlName="unit"
             class="border px-2 py-1 w-60"
             placeholder="Ex: EACH, CASE">
    </div>

    <!-- Abbreviation -->
    <div class="flex items-center">
      <label class="w-48">Abbreviation</label>
      <input formControlName="abbreviation"
             class="border px-2 py-1 w-60"
             placeholder="Ex: EA, CS">
    </div>

    <!-- Description -->
    <div class="flex items-start">
      <label class="w-48 mt-1">Description</label>
      <textarea formControlName="description"
                class="border px-2 py-1 w-80"
                rows="3"
                placeholder="Enter description"></textarea>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="flex justify-end gap-3 mt-3">

    <button type="button"
            (click)="resetForm()"
            class="px-4 py-1 border bg-white">
      Cancel
    </button>

    <button type="button"
            (click)="save()"
            class="px-4 py-1 bg-blue-600 text-white">
      OK
    </button>

  </div>

</form>
