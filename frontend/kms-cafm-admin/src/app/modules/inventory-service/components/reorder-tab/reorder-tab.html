<form [formGroup]="form" class="w-full text-sm bg-gray-100 p-4">

  <!-- HEADER -->
  <div class="bg-white border p-3 mb-3">
    <div class="flex items-center gap-3">
      <label class="w-40 font-medium">Service Item:</label>
      <input formControlName="itemCode" class="border px-2 py-1 w-32 bg-gray-100" readonly>
      <input formControlName="description" class="border px-2 py-1 flex-1 bg-gray-100" readonly>
    </div>
  </div>

  <!-- OPTIONS -->
  <div class="bg-white border p-4 mb-3 space-y-3">

    <div class="font-semibold border-b pb-2">
      Reorder Direct Issue Items / Services
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" formControlName="considerContracts">
      <label>Consider Contracts When Creating PRs/POs</label>
    </div>

    <div class="flex items-center">
      <label class="w-48">Additional Lead Time (Days):</label>
      <input type="number" formControlName="leadTime" class="border px-2 py-1 w-40">
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" formControlName="runBackground">
      <label>Run in Background Mode</label>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="button" (click)="preview()" class="px-4 py-1 border bg-gray-200">
        Preview
      </button>

      <button type="button" (click)="runReorder()" class="px-4 py-1 bg-blue-600 text-white">
        Run Reorder
      </button>
    </div>

  </div>

  <!-- PREVIEW TABLE -->
  <div class="bg-white border">

    <div class="px-3 py-2 bg-gray-100 font-medium">
      Reorder Items Detail
    </div>

    <table class="w-full text-xs border">
      <thead class="bg-gray-50">
        <tr>
          <th class="border px-2 py-1">Item</th>
          <th class="border px-2 py-1">Description</th>
          <th class="border px-2 py-1">Vendor</th>
          <th class="border px-2 py-1">Quantity</th>
          <th class="border px-2 py-1">Edit Qty</th>
        </tr>
      </thead>

      <!-- ✅ FormArray binding -->
      <tbody formArrayName="items">
        <tr *ngFor="let row of items.controls; let i = index" [formGroupName]="i">

          <td class="border px-2 py-1">{{ row.value.item }}</td>
          <td class="border px-2 py-1">{{ row.value.description }}</td>
          <td class="border px-2 py-1">{{ row.value.vendor }}</td>

          <td class="border px-2 py-1">{{ row.value.qty }}</td>

          <!-- ✅ Editable -->
          <td class="border px-2 py-1">
            <input type="number"
                   formControlName="qty"
                   class="border px-1 w-20">
          </td>

        </tr>

        <tr *ngIf="items.length === 0">
          <td colspan="5" class="text-center py-3 text-gray-400">
            No items to reorder
          </td>
        </tr>
      </tbody>
    </table>

  </div>

  <!-- FOOTER -->
  <div class="flex justify-end gap-3 mt-3">

    <button type="button" (click)="runReport()" class="px-4 py-1 border bg-gray-200">
      Run Report
    </button>

    <button type="button" (click)="runReorder()" class="px-4 py-1 bg-green-600 text-white">
      OK
    </button>

  </div>

</form>
