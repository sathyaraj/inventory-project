<div [formGroup]="form" class="text-xs">

  <!-- HEADER -->
  <div class="flex justify-between items-center p-3 px-3 py-2 bg-white">
    <div class="flex items-center gap-2">
      <span class="text-[14px]">Service Item:</span>

      <input formControlName="serviceitemCode"
             class="border px-2 py-1 w-40" />

      <input formControlName="serviceitemName"
             class="border px-2 py-1 w-72" />
    </div>
  </div>

 <!-- HEADER -->
<div class="px-3 py-2 bg-gray-100 flex justify-between">
  <div class="font-semibold">Organization Details</div>
  <button (click)="addOrg()" class="text-blue-600 hover:underline">
    New Row
  </button>
</div>

<!-- TABLE -->
<div class="overflow-x-auto">
  <table class="w-full text-xs border">

    <!-- HEADER -->
    <thead class="bg-white">
      <tr>
        <th class="border px-2 py-1">Organization</th>
        <th class="border px-2 py-1">GL Account</th>
        <th class="border px-2 py-1">Tax Code</th>
        <th class="border px-2 py-1">Tax Exempt</th>
        <th class="border px-2 py-1">Receipt Tolerance %</th>
        <th class="border px-2 py-1">Action</th>
      </tr>
    </thead>

    <!-- BODY -->
    <tbody formArrayName="organizationDetails">

      <ng-container *ngFor="let orgCtrl of organizationDetails.controls; let i = index">

        <!-- DISPLAY ROW -->
        <tr [formGroupName]="i">

          <td class="border px-2 py-1">
            {{ orgCtrl.get('organization')?.value }}
          </td>

          <td class="border px-2 py-1">
            {{ orgCtrl.get('glAccount')?.value }}
          </td>

          <td class="border px-2 py-1">
            {{ orgCtrl.get('taxCode')?.value }}
          </td>

          <td class="border px-2 py-1 text-center">
            <input type="checkbox"
                   [checked]="orgCtrl.get('taxExempt')?.value"
                   disabled>
          </td>

          <td class="border px-2 py-1">
            {{ orgCtrl.get('receiptTolerance')?.value }}
          </td>

          <td class="border px-2 py-1 flex gap-2">
            <button (click)="toggleDetails(i)" class="text-blue-600">
              {{ expandedIndex === i ? 'Hide' : 'Edit' }}
            </button>

            <button (click)="deleteOrg(i)" class="text-red-600">
              Delete
            </button>
          </td>

        </tr>

        <!-- EDIT ROW -->
        <tr *ngIf="expandedIndex === i" [formGroupName]="i">
          <td colspan="6" class="p-4 bg-gray-50">

            <div class="grid grid-cols-2 gap-4">

              <input formControlName="organization"
                     placeholder="Organization"
                     class="border px-2 py-1" />

              <input formControlName="glAccount"
                     placeholder="GL Account"
                     class="border px-2 py-1" />

              <input formControlName="taxCode"
                     placeholder="Tax Code"
                     class="border px-2 py-1" />

              <div class="flex items-center gap-2">
                <input type="checkbox" formControlName="taxExempt">
                <span>Tax Exempt</span>
              </div>

              <input formControlName="receiptTolerance"
                     type="number"
                     placeholder="Receipt Tolerance %"
                     class="border px-2 py-1" />

            </div>

            <div class="mt-3 text-right">
              <button (click)="saveOrg(i)"
                      class="bg-gray-200 px-3 py-1">
                Save
              </button>
            </div>

          </td>
        </tr>

      </ng-container>

    </tbody>
  </table>
</div>
</div>
