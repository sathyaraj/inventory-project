<div [formGroup]="form" class=" text-xs">

  <!-- HEADER -->
  <div class="flex justify-between items-center p-3 px-3 py-2 bg-white">
    <div class="flex p-3 items-center ">
      <span class="text-[14px] w-28">Item:</span>
      <input formControlName="venitemCode" readonly class="border border-gray-300 px-2 py-1 w-40" />
      <input formControlName="venitemName" class="border border-gray-300 px-2 py-1 w-72" />
       
      <button type="button" class="flex items-center justify-center ml-0 p-1  bg-gray-200 hover:bg-gray-100 ">
              <lucide-icon [img]="search" class="w-4 h-4 text-black ml-1 cursor-pointer relative right-[3px]"></lucide-icon>
          </button>
    </div>
  </div>

  <!-- VENDORS HEADER -->
  <div class="px-3 py-2 bg-gray-100  flex justify-between">
    <div class="font-semibold">Supplier</div>
    <button (click)="addVendor()" class="text-blue-600 hover:underline">New Row</button>
  </div>

  <!-- VENDORS TABLE -->
  <div class="overflow-x-auto">

    <table class="min-w-full text-sm text-left whitespace-nowrap border border-gray-200">

          <!-- HEADER -->
          <thead class="bg-gray-100 text-gray-600 uppercase text-xs sticky top-0 z-10">

            <!-- COLUMN TITLE -->
            <tr>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('pono')"
              >

                <div class="flex items-center gap-1">

                  <span>Po no</span>

                  <lucide-icon
                    [img]="
                      sortColumn === 'pono' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'pono' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('companyname')"
              >
              

                <div class="flex items-center gap-1">

                  <span>Company Name</span>

                  <lucide-icon
                    [img]="
                      sortColumn === 'companyname' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'companyname' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('currentbalance')"
              >

             

                <div class="flex items-center gap-1">

                  <span>Invoice No</span>

                  <lucide-icon
                    [img]="
                      sortColumn === 'invoiceno' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'invoiceno' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('statue')"
              >

              

                <div class="flex items-center gap-1">

                  <span>Lead Time Daly</span>

                  <lucide-icon
                    [img]="
                      sortColumn === 'leadTimeDaly' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'leadtimedaly' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('taxexempt')"
              >

           
                <div class="flex items-center gap-1">

                  <span>Tax Exempt</span>

                  <lucide-icon
                    [img]="
                      sortColumn === 'taxexempt' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'taxexempt' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
              <th class="border border-gray-200">Action</th>

            </tr>

            <!-- FILTER -->
            <tr>
              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text"
                  [(ngModel)]="poNoFilter"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="Po No"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>
              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text"
                  [(ngModel)]="companyFilter"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="Company Name"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>

              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text"
                  [(ngModel)]="invoiceFilter"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="Invoice"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>
              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text"
                  [(ngModel)]="leadTimeFilter"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="Lead time delay"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>
              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text"
                  [(ngModel)]="taxFilter"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="tax"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>

              <th class="border border-gray-200"></th>

            </tr>

          </thead>

                    <!-- BODY -->
         <tbody
  formArrayName="supplierdetails"
  *ngIf="supplierdetails.length > 0">

  <tr
    *ngFor="
      let row of supplierdetails.controls
      | slice:(currentPage - 1) * pageSize : currentPage * pageSize;
      let i = index
    "
    [formGroupName]="(currentPage - 1) * pageSize + i">

    <td class="border px-2 py-1">

      <span *ngIf="expandedIndex !== i">
        {{ row.get('pono')?.value }}
      </span>

      <input
        *ngIf="expandedIndex === i"
        formControlName="pono"
        class="border px-2 py-1 w-full">
    </td>

    <td class="border px-2 py-1">

      <span *ngIf="expandedIndex !== i">
        {{ row.get('companyName')?.value }}
      </span>

      <input
        *ngIf="expandedIndex === i"
        formControlName="companyName"
        class="border px-2 py-1 w-full">
    </td>

    <td class="border px-2 py-1">

      <span *ngIf="expandedIndex !== i">
        {{ row.get('invoiceno')?.value }}
      </span>

      <input
        *ngIf="expandedIndex === i"
        formControlName="invoiceno"
        class="border px-2 py-1 w-full">
    </td>

    <td class="border px-2 py-1">

      <span *ngIf="expandedIndex !== i">
        {{ row.get('leadtimedelay')?.value }}
      </span>

      <input
        *ngIf="expandedIndex === i"
        formControlName="leadtimedelay"
        class="border px-2 py-1 w-full">
    </td>

    <td class="border px-2 py-1 text-center">

      <span *ngIf="expandedIndex !== i">
        {{ row.get('taxexempt')?.value ? 'Yes' : 'No' }}
      </span>

      <input
        *ngIf="expandedIndex === i"
        type="checkbox"
        formControlName="taxexempt">
    </td>

    <td class="border px-2 py-1">

      <div *ngIf="expandedIndex !== i">

        <button
          type="button"
          class="text-blue-600 mr-2"
          (click)="expandedIndex = i">

          Edit

        </button>

        <button
          type="button"
          class="text-red-600"
          (click)="deleteVendor((currentPage - 1) * pageSize + i)">

          Delete

        </button>

      </div>

      <div *ngIf="expandedIndex === i">

        <button
          type="button"
          class="text-green-600 mr-2"
          (click)="saveVendor((currentPage - 1) * pageSize + i)">

          Save

        </button>

        <button
          type="button"
          class="text-gray-600"
          (click)="expandedIndex = null">

          Cancel

        </button>

      </div>

    </td>

  </tr>

</tbody>

        </table>

          <div class="flex justify-center items-center gap-2 mt-4 flex-wrap">

          <!-- Prev -->
          <button
            (click)="prevPage()"
            [disabled]="currentPage === 1"
            class="px-3 py-1 border rounded bg-gray-200 disabled:opacity-50">
            Prev
          </button>

          <!-- Page Numbers -->
          <button
            *ngFor="let page of pages"
            (click)="goToPage(page)"
            [class.bg-indigo-600]="currentPage === page"
            [class.text-white]="currentPage === page"
            class="px-3 py-1 border rounded hover:bg-indigo-500 hover:text-white">
            {{ page }}
          </button>

          <!-- Next -->
          <button
            (click)="nextPage()"
            [disabled]="currentPage === totalPages"
            class="px-3 py-1 border rounded bg-gray-200 disabled:opacity-50">
            Next
          </button>

        </div>
  </div>
</div>
