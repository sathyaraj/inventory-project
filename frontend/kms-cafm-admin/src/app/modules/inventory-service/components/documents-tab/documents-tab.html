<div [formGroup]="form" class=" text-xs">

  <!-- HEADER -->
  <div class="flex justify-between items-center p-3 px-3 py-2 bg-white">
    <div class="flex p-3 items-center ">
      <span class="text-[14px] w-28">Service Item:</span>
      <input formControlName="docuitemCode" readonly class="border border-gray-300 px-2 py-1 w-40" />
      <!-- <input formControlName="docuitemName" class="border border-gray-300 px-2 py-1 w-72" /> -->

      <div class="relative w-75 dropdown-wrapper">

              <!-- Input -->
              <input
                type="text"
                formControlName="docuitemName"
                [value]="selectedGroupName"
                (focus)="showGroupDropdown = true"
                (blur)="closeDropdown()"
                (input)="filterGroups($event)"
                placeholder="Item Name"
                class="flex-1 w-75 h-6 border border-gray-300 px-2 py-[4px] text-[12px] bg-white" />

              <!-- Dropdown -->
              <div *ngIf="showGroupDropdown"
                  class="absolute w-full bg-white border mt-1 max-h-40 overflow-y-auto z-50">

                <div *ngFor="let group of filteredGroups"
                    (click)="selectGroup(group)"
                    class="px-2 py-1 hover:bg-gray-100 cursor-pointer text-left">
                  {{ group.itemCode}}-{{group.itemName}}

                </div>

                <div *ngIf="filteredGroups.length === 0" class="px-2 py-1 text-gray-400">
                  No results
                </div>

              </div>

            </div>

      <button type="button" class="flex items-center justify-center ml-0 p-1  bg-gray-200 hover:bg-gray-100 ">
              <lucide-icon [img]="search" class="w-4 h-4 text-black ml-1 cursor-pointer relative right-[3px]" ></lucide-icon>
          </button>
    </div>
  </div>

  <!-- VENDORS HEADER -->
  <div class="px-3 py-2 bg-gray-100  flex justify-between">
    <div class="font-semibold">Documents</div>
    <button (click)="addVendor()" class="text-blue-600 hover:underline">New Row</button>
  </div>

  <!-- VENDORS TABLE -->
  <div class="overflow-x-auto">
  <table class="min-w-full text-sm text-left whitespace-nowrap border border-gray-200">

          <!-- HEADER -->
          <thead class="bg-gray-100 text-gray-600 uppercase text-xs sticky top-0 z-10">

            <!-- COLUMN TITLE -->
            <tr>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('Name')"
              >

                <div class="flex items-center gap-1">

                  <span>Name</span>
          
                  <lucide-icon
                    [img]="
                      sortColumn === 'name' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'name' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('document')"
              >          

                <div class="flex items-center gap-1">

                  <span>Documents</span>

                  <lucide-icon
                    [img]="
                      sortColumn === 'document' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'document' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
            
             
              <th class="border border-gray-200">Action</th>

            </tr>

            <!-- FILTER -->
            <tr>
              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text"
                  [(ngModel)]="name"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="name"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>
              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text"
                  [(ngModel)]="document"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="document"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>

              <th class="border border-gray-200"></th>

            </tr>

          </thead>

                    <!-- BODY -->
      <tbody formArrayName="documentdetail"  *ngIf="documentdetail && documentdetail.length > 0" >

            <tr
              *ngFor="let row of documentdetail.controls; let i = index"
              [formGroupName]="i"
              class="hover:bg-blue-50 bg-gray-100">

              <!-- Vendor -->
              <td class="border border-gray-200 px-2 py-1">

                <span *ngIf="expandedIndex !== i">
                  {{ row.get('name')?.value }}
                </span>

                <input
                *ngIf="expandedIndex === i"
                  formControlName="name"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]">

              </td>

              <!-- Lead Time -->
              <td class="border border-gray-200 px-2 py-1">
                          <span *ngIf="expandedIndex !== i">
                                {{ getFileName(row.get('existingFile')?.value) }}
                    
                  </span>

                    <input
                    *ngIf="expandedIndex === i"
                      type="file"
                      (change)="onFileChange($event, i)"
                      class="border px-2 py-1 text-xs rounded h-8 w-[100%]">

                    <!-- Existing File -->
                    <a
                      *ngIf="row.value.existingFile"
                      [href]="row.value.existingFile"
                      target="_blank"
                      class="text-blue-600 underline text-xs">

                      View File

                    </a>
              </td>
              <td class="border border-gray-200 px-2 py-1">
                      <div class="flex gap-2 justify-center">
                          <div *ngIf="expandedIndex !== i">

                          <button
                            class="text-blue-600 mr-2"
                            (click)="expandedIndex = i"
                          >
                            Edit
                          </button>

                          <button
                            class="text-red-600"
                            (click)="deleteVendor(row.get('id')?.value)"
                          >
                            Delete
                          </button>

                        </div>

                        <!-- EDIT MODE -->
                        <div *ngIf="expandedIndex === i">

                          <button
                            class="text-green-600 mr-2"
                          >
                            Save
                          </button>

                          <button
                            class="text-gray-600"
                            (click)="expandedIndex = null"
                          >
                            Cancel
                          </button>

                        </div>

                        </div>

              </td>

            </tr>

          </tbody>

        </table>

          <div class="flex justify-center items-center gap-2 mt-4 flex-wrap">

          <!-- Prev -->
          <button
            (click)="prevPage()"
            [disabled]="currentPage === 1"
            class="px-3 py-1 border rounded bg-gray-200 disabled:opacity-50">
            Prev
          </button>

          <!-- Page Numbers -->
          <button
            *ngFor="let page of pages"
            (click)="goToPage(page)"
            [class.bg-indigo-600]="currentPage === page"
            [class.text-white]="currentPage === page"
            class="px-3 py-1 border rounded hover:bg-indigo-500 hover:text-white">
            {{ page }}
          </button>

          <!-- Next -->
          <button
            (click)="nextPage()"
            [disabled]="currentPage === totalPages"
            class="px-3 py-1 border rounded bg-gray-200 disabled:opacity-50">
            Next
          </button>

        </div>

  </div>
</div>
<app-message-box
  [title]="messageTitle"
  [message]="messageText"
  [visible]="showMessageBox"
  (onConfirm)="confirmDeleteVendor()"
  (onCancel)="showMessageBox = false">
</app-message-box>
