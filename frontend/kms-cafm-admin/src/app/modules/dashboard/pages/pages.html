<div class="p-6 bg-gray-100 min-h-screen">

  <!-- HEADER -->
  <div class="mb-6">
    <h1 class="text-2xl font-semibold text-gray-700">
      Hi Graham, Good Morning
    </h1>
    <p class="text-gray-500 text-sm">
      Your dashboard gives you views of key performance or business process.
    </p>
  </div>

  <!-- CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

    <!-- Card 1 -->
    <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
      <div>
        <p class="text-gray-500 text-sm">Total Sales</p>
        <h2 class="text-xl font-bold">31.50</h2>
        <div class="w-full bg-gray-200 h-2 rounded mt-2">
          <div class="bg-blue-400 h-2 rounded w-3/4"></div>
        </div>
      </div>
      <div class="bg-blue-100 p-3 rounded-lg">📊</div>
    </div>

    <!-- Card 2 -->
    <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
      <div>
        <p class="text-gray-500 text-sm">Total Cost</p>
        <h2 class="text-xl font-bold">$4598</h2>
        <div class="w-full bg-gray-200 h-2 rounded mt-2">
          <div class="bg-pink-400 h-2 rounded w-2/3"></div>
        </div>
      </div>
      <div class="bg-pink-100 p-3 rounded-lg">💰</div>
    </div>

    <!-- Card 3 -->
    <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
      <div>
        <p class="text-gray-500 text-sm">Product Sold</p>
        <h2 class="text-xl font-bold">4589</h2>
        <div class="w-full bg-gray-200 h-2 rounded mt-2">
          <div class="bg-green-400 h-2 rounded w-4/5"></div>
        </div>
      </div>
      <div class="bg-green-100 p-3 rounded-lg">📦</div>
    </div>

  </div>

  <!-- CHARTS -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- Overview -->
    <div class="bg-white p-4 rounded-lg shadow">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold text-gray-700">Overview</h2>
        <select class="text-xs border rounded px-2 py-1">
          <option>This Month</option>
        </select>
      </div>

      <canvas id="overviewChart"></canvas>
    </div>

    <!-- Revenue vs Cost -->
    <div class="bg-white p-4 rounded-lg shadow">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold text-gray-700">Revenue Vs Cost</h2>
        <select class="text-xs border rounded px-2 py-1">
          <option>This Month</option>
        </select>
      </div>

      <canvas id="barChart"></canvas>
    </div>

  </div>
</div>
