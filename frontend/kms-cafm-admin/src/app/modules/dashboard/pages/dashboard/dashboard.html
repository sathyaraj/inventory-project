<div class="p-6 bg-gray-100 min-h-screen">

  <!-- HEADER -->

    <h1 class="text-2xl font-semibold text-gray-700">
      Hi Graham, Good Morning
    </h1>
    <p class="text-gray-500 text-sm">
      Your dashboard gives you views of key performance or business process.
    </p>
  </div> -->

  <!-- CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

    <!-- Card 1 -->
    <div class="bg-white p-3 rounded-lg shadow flex justify-between items-center">
      <div>
        <p class="text-gray-500 text-lg">Total Stock</p>
        <h2 class="text-xl font-bold"> {{ dashboardData?.totalStock }}</h2>
        <div class="w-full bg-gray-200 h-2 rounded mt-2">
          <div class="bg-blue-400 h-2 rounded w-3/4"></div>
        </div>
      </div>
      <div class="relative p-3 rounded-lg">

  <!-- Main Icon -->
  <lucide-icon
    [img]="boxes"
    class="relative z-10 flex justify-center items-center w-20 h-20 text-indigo-700 ml-1 cursor-pointer">
  </lucide-icon>

  <!-- Background Icon -->
  <lucide-icon
    [img]="boxes"
    class="absolute top-1 left-2 w-25 h-25 text-gray-200 cursor-pointer">
  </lucide-icon>

</div>
    </div>

    <!-- Card 2 -->
    <div class="bg-white p-3 rounded-lg shadow flex justify-between items-center">
      <div>
        <p class="text-gray-500 text-lg">Total Return</p>
        <h2 class="text-xl font-bold">{{ dashboardData?.lowStock }}</h2>
        <div class="w-full bg-gray-200 h-2 rounded mt-2">
          <div class="bg-pink-400 h-2 rounded w-2/3"></div>
        </div>
      </div>
      <div class="relative p-3 rounded-lg">
                <lucide-icon [img]="packageminus" class="relative z-10 flex justify-center items-center w-20 h-20 text-indigo-700 ml-1 cursor-pointer"></lucide-icon>
        <lucide-icon [img]="packageminus" class="absolute top-1 left-2 w-25 h-25 text-gray-200 cursor-pointer"></lucide-icon>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="bg-white p-3 rounded-lg shadow flex justify-between items-center">
      <div>
        <p class="text-gray-500 text-lg">Total Item</p>
        <h2 class="text-xl font-bold"> {{ dashboardData?.totalItems }}</h2>
        <div class="w-full bg-gray-200 h-2 rounded mt-2">
          <div class="bg-green-400 h-2 rounded w-4/5"></div>
        </div>
      </div>
      <div class="relative p-3 rounded-lg">
        
        <lucide-icon [img]="baggageclaim" class="relative z-10 flex justify-center items-center w-20 h-20 text-indigo-700 ml-1 cursor-pointer"></lucide-icon>
        <lucide-icon [img]="baggageclaim" class="absolute top-1 left-2 w-25 h-25 text-gray-200 cursor-pointer"></lucide-icon>
      
      </div>
    </div>


  </div>

  <!-- CHARTS -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- Overview -->
    <div class="bg-white p-4 rounded-lg shadow">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold text-gray-700">Overview</h2>
        <select
  [(ngModel)]="chartType"
  (change)="loadOverviewChart()"
  class="border rounded px-3 py-2 text-[12px]"
>
  <option value="day">Today</option>

  <option value="week">This Week</option>

  <option value="month">This Month</option>

</select>
      </div>

      <canvas id="overviewChart"></canvas>
    </div>

    <!-- Revenue vs Cost -->
    <div class="bg-white p-4 rounded-lg shadow">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold text-gray-700">Item Vs Stock</h2>
        <select
  [(ngModel)]="barChartType"
  (change)="loadBarChart()"
  class="border rounded px-3 py-2 text-[12px]">

  <option value="day">Today</option>

  <option value="week">This Week</option>

  <option value="month">This Month</option>

</select>
      </div>

     <canvas id="barChart"></canvas>
    </div>

  </div>

</div>
