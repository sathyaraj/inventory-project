<div class="p-6 bg-gray-50 min-h-screen">

  <!-- Header Section -->
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-semibold text-gray-800">
        Store List
      </h1>
      <p class="text-sm text-gray-500">
       Manage all inventory stores
      </p>
    </div>

    <button
      (click)="openCreateModal()"
      class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded shadow">
      + Create Storeroom
    </button>
  </div>
  

  <!-- Search & Filter -->
  <div class="bg-white p-4 rounded shadow mb-6">

     <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

      <input type="text"
           placeholder="Search store..."
           [(ngModel)]="searchText"
           class="border rounded px-3 py-2 w-64 focus:ring-2 focus:ring-blue-400 outline-none" />

    <select class="border rounded px-3 py-2">
      <option>All Status</option>
      <option>Active</option>
      <option>Inactive</option>
    </select>

     <button
        class="bg-gray-800 text-white rounded px-4 py-2 hover:bg-gray-900 ">
        Search
      </button>
    </div>
  </div>

  <div class="bg-white rounded shadow overflow-hidden">
      
    <table class="min-w-full text-sm text-left">
      <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
        <tr>
          <th class="px-4 py-2 ">Store Code</th>
          <th class="px-4 py-2 ">Store Name</th>
          <th class="px-4 py-2 ">Organization</th>
          <th class="px-4 py-2 ">Location</th>
          <th class="px-4 py-2 ">Status</th>
          <th class="px-6 py-3 text-right">Actions</th>
        </tr>
      </thead>

      <tbody class="divide-y">

        <tr class="hover:bg-gray-50 transition">
          <td class="px-6 py-3 font-medium text-indigo-600">
            ITM-001
          </td>
          <td class="px-6 py-3">Air Filter</td>
          <td class="px-6 py-3">ITEM</td>

          <td class="px-6 py-3">
            <span
              class="px-2 py-1 text-xs font-semibold bg-green-100 text-green-700 rounded-full">
              ACTIVE
            </span>
          </td>

          <td class="px-6 py-3">ABC Vendors</td>

          <td class="px-6 py-3 text-right space-x-2">

            <button
              routerLink="/item-master/details/1"
              class="text-blue-600 hover:underline">
              View
            </button>

            <button
              routerLink="/item-master/edit/1"
              class="text-indigo-600 hover:underline">
              Edit
            </button>

            <button
              class="text-red-600 hover:underline">
              Delete
            </button>

          </td>
        </tr>

      </tbody>
    </table>
  </div>

  <div class="flex justify-between items-center mt-6">

    <p class="text-sm text-gray-500">
      Showing 1 to 10 of 100 entries
    </p>

    <div class="space-x-2">
      <button class="px-3 py-1 border rounded">Prev</button>
      <button class="px-3 py-1 bg-indigo-600 text-white rounded">1</button>
      <button class="px-3 py-1 border rounded">2</button>
      <button class="px-3 py-1 border rounded">Next</button>
    </div>

  </div>
