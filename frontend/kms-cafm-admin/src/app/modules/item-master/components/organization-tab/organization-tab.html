<div [formGroup]="form" class=" text-sm">
  <div class="text-center p-3 border-b border-gray-200  grid grid-cols-1 gap-3"> 
    <div class=" w-[50%] text-center p-3 grid grid-cols-1 gap-2"> 
      <div class="flex items-center gap-2"> 
        <label class="w-32 text-left">Top Level Item:</label> 
        <input formControlName="TopLevelItem" readonly class="w-28 h-6 border border-gray-300 text-[12px] px-2 py-[4px] ">
         <!-- <input formControlName="TopLevelCode" class="flex-1 h-6 border border-gray-300 text-[12px] px-2 py-[4px] ">  -->
          <div class="relative w-75 dropdown-wrapper">

              <!-- Input -->
              <input
                type="text"
                formControlName="TopLevelCode"
                [value]="selectedGroupName"
                (focus)="showGroupDropdown = true"
                (blur)="closeDropdown()"
                (input)="filterGroups($event)"
                placeholder="Item Name"
                class="w-85 h-6 border border-gray-300 px-2 py-[3px] bg-white" />

              <!-- Dropdown -->
              <div *ngIf="showGroupDropdown"
                  class="absolute w-full bg-white border mt-1 max-h-40 overflow-y-auto z-50">

                <div *ngFor="let group of filteredGroups"
                    (click)="selectGroup(group)"
                    class="px-2 py-1 hover:bg-gray-100 cursor-pointer text-left">
                  {{ group.itemCode}}-{{group.itemName}}

                </div>

                <div *ngIf="filteredGroups.length === 0" class="px-2 py-1 text-gray-400">
                  No results
                </div>

              </div>

            </div>
        </div> 
        <div class="flex items-center gap-2"> 
          <label class="w-32 text-left">Current Level:</label> 
          <input formControlName="CurrentLevel" class="w-28 h-6 border border-gray-300 text-[12px] px-2 py-[4px]"> 
          <input formControlName="CurrentLevelCode" class="flex-1 h-6 border border-gray-300 text-[12px] px-2 py-[4px]">

          



         </div> <div class="flex items-center gap-2">
           <label class="w-32 text-left">Belongs To:</label> 
           <input type="text" formControlName="BelongsTo" class="flex-1 h-6 border border-gray-300 text-[12px] px-2 py-1 text-xs"> 
          </div> <div class="flex items-center gap-2"> 
            <label class="w-32 text-left">Remarks:</label> 
            <input type="text" formControlName="Remarks" class="flex-1 h-6 border border-gray-300 text-[12px] px-2 py-1 text-xs">
           </div> 
          </div> 
        </div>
  <!-- Vendors Section -->
  <div class="px-3 py-2 bg-gray-100 border-b border-gray-200 flex justify-between">
    <div class="font-semibold">Children</div>
    <button (click)="addAssemblyDetail()" class="text-blue-600 hover:underline">New Row</button>
  </div>

  

  <div class="overflow-x-auto">
    <table class="min-w-full text-sm text-left whitespace-nowrap border border-gray-200">

          <!-- HEADER -->
          <thead class="bg-gray-100 text-gray-600 uppercase text-xs sticky top-0 z-10">

            <!-- COLUMN TITLE -->
            <tr>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('item')"
              >

                <div class="flex items-center gap-1">

                  <span>Item</span>
          
                  <lucide-icon
                    [img]="
                      sortColumn === 'Item' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'Item' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('description')"
              >          

                <div class="flex items-center gap-1">

                  <span>Description</span>

                  <lucide-icon
                    [img]="
                      sortColumn === 'description' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'description' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('value')"
              >
        
                <div class="flex items-center gap-1">

                  <span>Quantity</span>

                  <lucide-icon
                    [img]="
                      sortColumn === 'quantity' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'quantity' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
              <th
                class="px-4 py-3 border border-gray-200 cursor-pointer hover:bg-gray-200"
                (click)="sortTable('remarks')"
              >


                <div class="flex items-center gap-1">
                  <span>Remarks </span>

                  <lucide-icon
                    [img]="
                      sortColumn === 'remarks' &&
                      sortDirection === 'asc'
                        ? moveup
                        : movedown
                    "
                    class="w-3 h-3"
                    [ngClass]="
                      sortColumn === 'remarks' && sortDirection === 'desc'
                        ? 'text-gray-400'
                        : 'text-blue-600'
                    "
                  >
                  </lucide-icon>

                </div>

              </th>
             
              <th class="border border-gray-200">Action</th>

            </tr>

            <!-- FILTER -->
            <tr>
              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text"
                  [(ngModel)]="item"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="Item"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>
              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text" 
                  [(ngModel)]="description"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="Description"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>

              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text"
                  [(ngModel)]="quantity"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="Quantity"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>
              <th class="border border-gray-200 px-2 py-1">

                <input
                  type="text"
                  [(ngModel)]="remarks"
                  [ngModelOptions]="{standalone: true}"
                  (input)="applyFilters()"
                  placeholder="Remarks"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]"
                />

              </th>

              <th class="border border-gray-200"></th>

            </tr>

          </thead>

                    <!-- BODY -->
      <tbody formArrayName="assemblydetails"  *ngIf="assemblydetails && assemblydetails.length > 0">

            <tr
              *ngFor="let row of assemblydetails.controls; let i = index"
              [formGroupName]="i"
              class="hover:bg-blue-50 bg-gray-100">

              <!-- Vendor -->
              <td class="border border-gray-200 px-2 py-1">

                <span *ngIf="expandedIndex !== i">
                  {{ row.get('item')?.value }}
                </span>

                <input
                *ngIf="expandedIndex === i"
                  formControlName="item"
                  class="border px-1 py-1 text-xs rounded h-8 w-[100%]">

              </td>

              <!-- Lead Time -->
              <td class="border border-gray-200 px-2 py-1">
                <span *ngIf="expandedIndex !== i">
                  {{ row.get('description')?.value }}
                </span>

                <input
                *ngIf="expandedIndex === i"
                  formControlName="description"
                 class="border px-2 py-1 text-xs rounded h-8 w-[100%]">

              </td>

              <!-- Tax Exempt -->
              <td class="border border-gray-200 px-2 py-1 text-center">
                <span *ngIf="expandedIndex !== i">
                  {{ row.get('quantity')?.value}}
                </span>

                 <input
                *ngIf="expandedIndex === i"
                  formControlName="quantity"
                  type="number"
                  class="border px-2 py-1 text-xs rounded h-8 w-[100%]">


              </td>

              <!-- Default Vendor -->
              <td class="border border-gray-200 px-2 py-1 text-center">
                <span *ngIf="expandedIndex !== i">
                  {{ row.get('remark')?.value}}
                </span>
                
                 <input
                *ngIf="expandedIndex === i"
                  formControlName="remark"
                 class="border px-2 py-1 text-xs rounded h-8 w-[100%]">
                
              </td>

              <!-- Organization -->
  

              <!-- Action -->
              <td class="border border-gray-200 px-2 py-1">

      <div class="flex gap-2 justify-center">
        <div *ngIf="expandedIndex !== i">

        <button
          class="text-blue-600 mr-2"
          (click)="expandedIndex = i"
        >
          Edit
        </button>

        <button
          class="text-red-600"
          (click)="removeAssemblyDetail(i)"
        >
          Delete
        </button>

      </div>

      <!-- EDIT MODE -->
      <div *ngIf="expandedIndex === i">

        <button
          class="text-green-600 mr-2"
          (click)="saveAssemblyDetail(i)"
        >
          Save
        </button>

        <button
          class="text-gray-600"
          (click)="expandedIndex = null"
        >
          Cancel
        </button>

      </div>

      </div>

    </td>

            </tr>

          </tbody>

        </table>
        <div class="flex justify-center items-center gap-2 mt-4 flex-wrap">

          <!-- Prev -->
          <button
            (click)="prevPage()"
            [disabled]="currentPage === 1"
            class="px-3 py-1 border rounded bg-gray-200 disabled:opacity-50">
            Prev
          </button>

          <!-- Page Numbers -->
          <button
            *ngFor="let page of pages"
            (click)="goToPage(page)"
            [class.bg-indigo-600]="currentPage === page"
            [class.text-white]="currentPage === page"
            class="px-3 py-1 border rounded hover:bg-indigo-500 hover:text-white">
            {{ page }}
          </button>

          <!-- Next -->
          <button
            (click)="nextPage()"
            [disabled]="currentPage === totalPages"
            class="px-3 py-1 border rounded bg-gray-200 disabled:opacity-50">
            Next
          </button>

        </div>
  
  </div>
</div>
<app-message-box
  [title]="messageTitle"
  [message]="messageText"
  [visible]="showMessageBox"
  (onConfirm)="confirmDeleteAssembly()"
  (onCancel)="showMessageBox = false">
</app-message-box>
