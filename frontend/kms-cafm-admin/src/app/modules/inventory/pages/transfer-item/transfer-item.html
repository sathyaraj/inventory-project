<div class="p-6 bg-gray-50 min-h-screen">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold text-gray-800">
      Transfer Item (Inter-Storeroom)
    </h1>

    <button
      class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700"
      (click)="openCreateModal()">
      + New Transfer
    </button>   
  </div>

  <!-- Summary Cards -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">

    <div class="bg-white p-4 shadow-sm">
      <p class="text-gray-500 text-sm">Today Transfers</p>
      <h2 class="text-xl font-bold mt-2">6</h2>
    </div>

    <div class="bg-white p-4 shadow-sm">
      <p class="text-gray-500 text-sm">Total Quantity</p>
      <h2 class="text-xl font-bold mt-2">980 Units</h2>
    </div>

    <div class="bg-white p-4 shadow-sm">
      <p class="text-gray-500 text-sm">In Transit</p>
      <h2 class="text-xl font-bold text-orange-500 mt-2">2</h2>
    </div>

    <div class="bg-white p-4 shadow-sm">
      <p class="text-gray-500 text-sm">Completed</p>
      <h2 class="text-xl font-bold text-green-600 mt-2">4</h2>
    </div>

  </div>

  <!-- Filters -->
  <div class="bg-white p-4 shadow-sm mb-6">
    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">

      <input type="text"
        placeholder="Search Transfer No / Item..."
        class="border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500">

      <select class="border rounded px-3 py-2">
        <option>From Storeroom</option>
      </select>

      <select class="border rounded px-3 py-2">
        <option>To Storeroom</option>
      </select>

      <input type="date"
        class="border rounded px-3 py-2">

      <select class="border rounded px-3 py-2">
        <option>All Status</option>
        <option>Draft</option>
        <option>Pending</option>
        <option>In Transit</option>
        <option>Completed</option>
        <option>Rejected</option>
      </select>

    </div>
  </div>

  <!-- Table -->
  <div class="bg-white shadow-sm overflow-hidden">

    <table class="min-w-full text-sm text-left">
      <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
        <tr>
          <th class="px-6 py-3">Transfer No</th>
          <th class="px-6 py-3">Date</th>
          <th class="px-6 py-3">From</th>
          <th class="px-6 py-3">To</th>
          <th class="px-6 py-3">Item</th>
          <th class="px-6 py-3">Quantity</th>
          <th class="px-6 py-3">Status</th>
          <th class="px-6 py-3">Action</th>
        </tr>
      </thead>

      <tbody>

        <tr class="border-0 hover:bg-gray-50">
          <td class="px-6 py-3">TRF-0034</td>
          <td class="px-6 py-3">03-03-2026</td>
          <td class="px-6 py-3">Main Warehouse</td>
          <td class="px-6 py-3">Site Store - Block A</td>
          <td class="px-6 py-3">PVC Pipe</td>
          <td class="px-6 py-3">300</td>
          <td class="px-6 py-3">
            <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded-full text-xs">
              In Transit
            </span>
          </td>
          <td class="px-6 py-3 space-x-2">
            <button class="text-indigo-600">View</button>
            <button class="text-red-500">Cancel</button>
          </td>
        </tr>

      </tbody>
    </table>

  </div>

  <!-- Pagination -->
  <div class="flex justify-end mt-4">
    <button class="px-3 py-1 border rounded mr-2">Prev</button>
    <button class="px-3 py-1 border rounded">Next</button>
  </div>

</div>


@if (showCreateModal) {

  <div class="fixed inset-0 z-[1000] flex items-center justify-center">

    <!-- Background -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"
         (click)="closeCreateModal()">
    </div>

    <!-- Modal -->
    <div class="relative bg-white w-full max-w-5xl rounded-2xl shadow-2xl overflow-hidden">

      <!-- Header -->
      <div class="flex justify-between items-center px-6 py-4 border-b bg-gray-50">
        <h2 class="text-lg font-semibold text-gray-800">
          Transfer Item
        </h2>

        <button (click)="closeCreateModal()"
                class="text-gray-400 hover:text-red-500 text-xl">
          ✕
        </button>
      </div>

      <!-- Body -->
      <div class="p-6 max-h-[80vh] overflow-y-auto">
        <app-transfer-item-modal
          (close)="closeCreateModal()">
        </app-transfer-item-modal>
      </div>

    </div>

  </div>

}
