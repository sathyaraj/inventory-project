 <div

<div class="p-6 bg-white min-h-screen">
   

    <!-- Header Section -->
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-semibold text-gray-800">
        Currency List
      </h1>
    </div>

    <button
    (click)="createcurrency()"
      class=" border border-indigo-700 text-indigo-700 hover:bg-indigo-700 hover:text-white px-4 py-2 rounded shadow">
      + Create Currency
    </button>
  </div>
  


  <!-- HEADER -->
  <!-- <div class="flex justify-between items-center px-4 py-3 border-b bg-gray-50">
    </div> -->

     <div class="bg-white rounded shadow overflow-x-auto max-h-[700px] relative">

  <table class="min-w-full text-sm text-left whitespace-nowrap">

    <!-- HEADER -->
    <thead
      class="bg-gray-100 text-gray-600 uppercase text-xs sticky top-0 z-10"
    >

      <tr>

        <th
          *ngFor="let col of columns"
          [hidden]="!col.visible"
          class="px-4 py-3 border border-gray-200 cursor-pointer
                 select-none border-b
                 hover:bg-gray-200"
          (click)="sortTable(col.field)"
        >

          <div class="flex items-center gap-1">

            <span>{{ col.title }}</span>
            

            <span>

            <div class="flex flex-col leading-none">

  <!-- ASC -->
  <lucide-icon
    [img]="
      sortColumn === col.field &&
      sortDirection === 'asc'
        ? moveup
        : movedown
    "
    class="w-3 h-3"
     [ngClass]="
      sortColumn === col.field && sortDirection === 'desc'
        ? 'text-gray-400'
        : 'text-blue-600'
    "
    >
  </lucide-icon>

</div>          </span>

          </div>

        </th>

      </tr>

    </thead>

    <thead class="bg-gray-100 sticky top-0 z-10">
  <tr>
    <th *ngFor="let col of columns" [hidden]="!col.visible" class="border border-gray-200">

      <div class="flex flex-col gap-1 items-center">


        <!-- Column filter -->
        <!-- <input
          type="text"
          [(ngModel)]="filtersFD[col.field]"
          (input)="applyFilters()"
          placeholder="{{ col.title }}"
          class="border px-2 py-1 text-xs rounded m-1 h-8 w-[90%]"
        /> -->

      </div>

    </th>
  </tr>
</thead>


<tbody class="divide-y relative">

  <tr
    *ngFor="let item of paginatedItems; let i = index"
    class="group relative border border-gray-200  
           hover:bg-blue-50 transition "
    [class.bg-gray-50]="i % 2 === 0"
  (click)="editcurrency(item)"
  >

    <td
      *ngFor="let col of columns"
      [hidden]="!col.visible"
      class="px-4 py-2 border border-gray-200 "
    >

      <!-- VALUE -->
      <span>

        {{
          item[col.field]
        }}

      </span>
     

    </td>

    <td
       class="px-4 py-2 border border-gray-200 "
    >

      <div
        class="items-center justify-center
               gap-2 px-2"
      >

        <!-- EDIT -->
        <button
          type="button"
          class="p-1 rounded
                 hover:bg-green-100">

          <lucide-icon
            [img]="pencil"
            class="w-4 h-4 text-green-600">
          </lucide-icon>

        </button>

        <!-- DELETE -->
        <button
          type="button"
          class="p-1 rounded
                 hover:bg-red-100"
          (click)="deleteItem(item.id); $event.stopPropagation()"
        >

          <lucide-icon
            [img]="trash"
            class="w-4 h-4 text-red-600">
          </lucide-icon>

        </button>

      </div>

    </td>

    

  </tr>

   
</tbody>


  </table>

</div>

  <div class="flex justify-center items-center gap-2 mt-4 flex-wrap">

  <!-- Prev -->
  <button
    (click)="prevPage()"
    [disabled]="currentPage === 1"
    class="px-3 py-1 border rounded bg-gray-200 disabled:opacity-50">
    Prev
  </button>

  <!-- Page Numbers -->
  <button
    *ngFor="let page of pages"
    (click)="goToPage(page)"
    [class.bg-indigo-600]="currentPage === page"
    [class.text-white]="currentPage === page"
    class="px-3 py-1 border rounded hover:bg-indigo-500 hover:text-white">
    {{ page }}
  </button>

  <!-- Next -->
  <button
    (click)="nextPage()"
    [disabled]="currentPage === totalPages"
    class="px-3 py-1 border rounded bg-gray-200 disabled:opacity-50">
    Next
  </button>

</div>

  <!-- PAGINATION -->
</div>

<app-message-box
  [title]="messageTitle"
  [message]="messageText"
  [visible]="showConfirmBox"
  (onConfirm)="confirmDelete()"
  (onCancel)="showConfirmBox = false">
</app-message-box>

<app-message-box
  [title]="messageTitle"
  [message]="messageText"
  [visible]="showMessageBox"
  (onConfirm)="showMessageBox = false"
  (onCancel)="showMessageBox = false">
</app-message-box>
