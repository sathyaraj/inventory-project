<div class="bg-white rounded shadow border">

  <!-- HEADER -->
  <div class="flex justify-between items-center px-4 py-3 border-b">

    <h2 class="text-lg font-semibold">
      Inventory Pricing Settings
    </h2>

    <button
      class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
    >
      + Add Setting
    </button>

  </div>

  <!-- SEARCH -->
  <div class="p-4 border-b">

    <input
      type="text"
      placeholder="Search..."
      class="w-72 h-9 border rounded px-3"
    >

  </div>

  <!-- TABLE -->
  <div class="overflow-x-auto">

    <table class="w-full text-sm">

      <thead class="bg-gray-100">

        <tr>

          <th class="text-left px-4 py-3 border-b">
            Currency
          </th>

          <th class="text-left px-4 py-3 border-b">
            Default Tax %
          </th>

          <th class="text-left px-4 py-3 border-b">
            Tax Type
          </th>

          <th class="text-left px-4 py-3 border-b">
            Default Discount %
          </th>

          <th class="text-left px-4 py-3 border-b">
            Max Discount %
          </th>

          <th class="text-left px-4 py-3 border-b">
            Decimal Precision
          </th>

          <th class="text-left px-4 py-3 border-b">
            Multi Currency
          </th>

          <th class="text-center px-4 py-3 border-b">
            Actions
          </th>

        </tr>

      </thead>

      <tbody>

        <tr class="hover:bg-gray-50">

          <td class="px-4 py-3 border-b">
            AED
          </td>

          <td class="px-4 py-3 border-b">
            5%
          </td>

          <td class="px-4 py-3 border-b">
            Exclusive
          </td>

          <td class="px-4 py-3 border-b">
            10%
          </td>

          <td class="px-4 py-3 border-b">
            25%
          </td>

          <td class="px-4 py-3 border-b">
            2
          </td>

          <td class="px-4 py-3 border-b">
            Yes
          </td>

          <td class="px-4 py-3 border-b text-center">

            <button
              class="px-3 py-1 bg-yellow-500 text-white rounded mr-2"
            >
              Edit
            </button>

            <button
              class="px-3 py-1 bg-red-600 text-white rounded"
            >
              Delete
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
