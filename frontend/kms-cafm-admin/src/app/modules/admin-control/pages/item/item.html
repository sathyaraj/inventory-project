<form [formGroup]="itemForm" class="w-full bg-gray-200 text-sm">

  <!-- ================= TOOLBAR ================= -->
  <div class="bg-gray-100 px-3 border-b border-gray-300 py-2 flex items-center gap-3">

    <!-- Find -->
    <div
          class="w-8 h-8 
                 bg-gradient-to-br from-blue-500 to-indigo-600
                 flex items-center justify-center shadow-lg"
        >

          <lucide-icon
            [img]="Settings"
            class="w-8 h-8 text-white"
          >
          </lucide-icon>

        </div>

        <!-- TEXT -->
        <div>

          <h1 class="text-[20px] font-bold text-gray-800">
            Admin Settings
          </h1>

          <p class="text-gray-500 mt-1">
            Manage and configure your system settings
          </p>

        </div>




<!-- Icons -->


  </div>
  <!-- ================= TABS ================= -->
  <div class="bg-gray-100 border-b border-gray-300 flex text-sm">
     <button
      type="button"
      (click)="currencylist()"
      class="flex items-center gap-2  px-5 py-3 border-r border-gray-200 hover:bg-gray-200">
       <lucide-icon
          [img]="list"
          class="w-4 h-4"
        >
        </lucide-icon>
      List
    </button>

    <!-- <button
      type="button"
      (click)="changeTab('serviceitem')"
      [ngClass]="activeTab === 'serviceitem'
          ? 'px-5 py-3 bg-white border-t border-l border-r border-b border-indigo-700 border-gray-200 font-semibold text-indigo-700'
        : 'px-5 py-3 border-r border-gray-200 hover:bg-gray-200'">
      Service Item
    </button> -->
     <button
    type="button"
    (click)="changeTab('currency')"
    [ngClass]="activeTab === 'currency'
      ? 'flex items-center gap-2 px-5 py-3 bg-white border-t border-l border-r border-indigo-700 font-semibold text-indigo-700'
      : 'flex items-center gap-2 px-5 py-3 border-r border-gray-200 hover:bg-gray-200'">
      <lucide-icon
          [img]="Coins"
          class="w-4 h-4"
        >
        </lucide-icon>
    Currency
  </button>

  </div>

  <!-- ================= CONTENT ================= -->
  <div class="p-0 bg-white min-h-[400px]">

      <!-- <ng-container *ngIf="activeTab === 'itemsetting'">
        <app-itemsetting-tab [form]="itemsettingForm"></app-itemsetting-tab>
      </ng-container> -->

      <ng-container *ngIf="activeTab === 'currency'">
        <app-currency-tab
  [form]="currencyForm">
</app-currency-tab>
      </ng-container>
      

  </div>
</form>
