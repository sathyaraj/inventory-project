<div class="flex items-center justify-center min-h-screen bg-gray-100">

  <div class="w-full max-w-md bg-white p-8 rounded shadow">

    <h2 class="text-2xl font-bold text-center mb-2">Create Account</h2>
    <p class="text-gray-500 text-center mb-6">Register to continue</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">

  <!-- Name -->
  <div>
    <label>Name</label>
    <input type="text"
      formControlName="name"   
      class="w-full mt-1 p-2 border rounded"
      placeholder="Enter your name">

    <div *ngIf="f['name']?.touched && f['name']?.invalid"
         class="text-red-500 text-sm">
      Name is required
    </div>
  </div>

  <!-- Email -->
  <div>
    <label>Email</label>
    <input type="email"
      formControlName="email"   
      class="w-full mt-1 p-2 border rounded"
      placeholder="Enter your email">

    <div class="text-red-500 text-sm"
         *ngIf="f['email']?.touched && f['email']?.invalid">

      <span *ngIf="f['email']?.errors?.['required']">
        Email is required
      </span>

      <span *ngIf="f['email']?.errors?.['email']">
        Enter valid email
      </span>
    </div>
  </div>

  <!-- Password -->
  <div>
    <label>Password</label>
    <input type="password"
      formControlName="password" 
      class="w-full mt-1 p-2 border rounded"
      placeholder="Enter password">

    <div class="text-red-500 text-sm"
         *ngIf="f['password']?.touched && f['password']?.invalid">

      <span *ngIf="f['password']?.errors?.['required']">
        Password required
      </span>

      <span *ngIf="f['password']?.errors?.['minlength']">
        Minimum 6 characters
      </span>
    </div>
  </div>

  <button type="submit"
    [disabled]="registerForm.invalid"
    class="w-full bg-green-600 text-white py-2 rounded">
    Register
  </button>

</form>

  </div>

</div>
