<div class="flex items-center justify-center min-h-screen bg-gray-100">

  <div class="w-full max-w-md bg-white p-8 rounded shadow">

    <h2 class="text-2xl font-bold text-center mb-2">Inventory Admin</h2>
    <p class="text-gray-500 text-center mb-6">Sign in to continue</p>

     <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
~
  <!-- Email -->
  <div>
    <label class="block text-sm font-medium">Email</label>

    <input 
      type="email"
      formControlName="email"
      class="w-full mt-1 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
      placeholder="Enter your email">

    <div class="text-red-500 text-sm"
      *ngIf="f['email']?.touched && f['email']?.invalid">

      <span *ngIf="f['email']?.errors?.['required']">
        Email is required
      </span>

      <span *ngIf="f['email']?.errors?.['email']">
        Enter valid email
      </span>

    </div>
  </div>

  <!-- Password -->
  <div>
    <label class="block text-sm font-medium">Password</label>

    <input 
      type="password"
      formControlName="password" 
      class="w-full mt-1 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
      placeholder="Enter your password">

    <div class="text-red-500 text-sm"
      *ngIf="f['password']?.touched && f['password']?.invalid">

      Password is required

    </div>
  </div>

  <!-- Button -->
   <!-- [disabled]="loginForm.invalid" -->
  <!-- <button
    type="submit"
    class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
    Login
  </button> -->

  <button
  [disabled]="loading"
  type="submit"
    class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
  {{ loading ? 'Signing In...' : 'Login1' }}
</button>

</form>

  </div>

</div>
