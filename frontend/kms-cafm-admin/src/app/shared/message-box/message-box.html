<div *ngIf="visible" 
     class="fixed top-1/2 right-5 transform -translate-y-1/2 z-50 animate-slideIn">

  <div class="bg-white p-4 w-72 border border-indigo-700">

    <!-- Header -->
    <div class="flex justify-between items-center mb-2">
      <div class="flex items-center gap-2">
        <span>{{ icon }}</span>
        <h2 class="text-sm font-semibold" [ngClass]="headerColor">
          {{ title }}
        </h2>
      </div>

      <button (click)="cancel()" class="text-gray-400 hover:text-black">
        ✖
      </button>
    </div>

    <!-- Message -->
    <p class="text-xs text-gray-600 mb-3">
      {{ message }}
    </p>

    <!-- Actions -->
    <div class="flex justify-end gap-2">
      <button 
        (click)="cancel()" 
        class="px-2 py-1 text-xs border rounded">
        Cancel
      </button>

      <button 
        (click)="confirm()" 
        class="px-2 py-1 text-xs bg-blue-600 text-white rounded">
        OK
      </button>
    </div>

  </div>

</div>
