<div class="bg-white rounded shadow overflow-x-auto max-h-[700px] relative">

  <table class="min-w-full text-sm text-left whitespace-nowrap">

    <!-- HEADER -->
    <thead
      class="bg-gray-100 text-gray-600 uppercase text-xs sticky top-0 z-10">

      <tr>

        <th
          *ngFor="let col of columns"
          [hidden]="!col.visible"
          class="px-4 py-3 border border-gray-200
                 cursor-pointer select-none
                 hover:bg-gray-200"
          (click)="sortTable(col.field)">

          <div class="flex items-center gap-1">

            <span>{{ col.title }}</span>

            <lucide-icon
              [img]="
                sortColumn === col.field &&
                sortDirection === 'asc'
                  ? moveup
                  : movedown
              "
              class="w-3 h-3">
            </lucide-icon>

          </div>

        </th>

        <!-- ACTION -->
        <th
          class="px-4 py-3 border border-gray-200
                 bg-gray-100 sticky right-0 z-20">

          Action

        </th>

      </tr>

    </thead>

    <!-- BODY -->
    <tbody class="divide-y relative">

      <tr
        *ngFor="
          let item of paginatedItems;
          let i = index
        "
        class="group hover:bg-blue-50 transition"
        [class.bg-gray-50]="i % 2 === 0">

        <!-- DATA -->
        <td
          *ngFor="let col of columns"
          [hidden]="!col.visible"
          class="px-4 py-2 border border-gray-200">

          {{ item[col.field] }}

        </td>

        <!-- ACTION -->
        <td
          class="sticky right-0 bg-white
                 border border-gray-200
                 w-[80px] z-20">

          <div
            class="flex items-center
                   justify-center gap-2">

            <!-- EDIT -->
            <button
              type="button"
              class="p-1 rounded
                     hover:bg-green-100"
              (click)="editItem(item)">

              <lucide-icon
                [img]="pencil"
                class="w-4 h-4 text-green-600">
              </lucide-icon>

            </button>

            <!-- DELETE -->
            <button
              type="button"
              class="p-1 rounded
                     hover:bg-red-100"
              (click)="deleteItem(item.id)">

              <lucide-icon
                [img]="trash"
                class="w-4 h-4 text-red-600">
              </lucide-icon>

            </button>

          </div>

        </td>

      </tr>

    </tbody>

  </table>

</div>

<!-- PAGINATION -->
<div
  class="flex justify-center
         items-center gap-2
         mt-4 flex-wrap">

  <!-- PREV -->
  <button
    (click)="prevPage()"
    [disabled]="currentPage === 1"
    class="px-3 py-1 border rounded
           bg-gray-200
           disabled:opacity-50">

    Prev

  </button>

  <!-- PAGES -->
  <button
    *ngFor="let page of pages"
    (click)="goToPage(page)"
    [class.bg-indigo-600]="currentPage === page"
    [class.text-white]="currentPage === page"
    class="px-3 py-1 border rounded
           hover:bg-indigo-500
           hover:text-white">

    {{ page }}

  </button>

  <!-- NEXT -->
  <button
    (click)="nextPage()"
    [disabled]="currentPage === totalPages"
    class="px-3 py-1 border rounded
           bg-gray-200
           disabled:opacity-50">

    Next

  </button>

</div>
