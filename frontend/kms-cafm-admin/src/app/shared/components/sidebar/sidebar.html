<div class="w-72 h-screen bg-slate-900 text-gray-200 flex flex-col shadow-2xl">

  <!-- LOGO -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-slate-800">

    <div class="flex items-center gap-3">

      <div class="w-11 h-11 rounded-2xl bg-blue-600 flex items-center justify-center shadow-lg">

        <lucide-icon
          [img]="LayoutDashboard"
          class="w-6 h-6 text-white"
        >
        </lucide-icon>

      </div>

      <div>

        <h1 class="text-2xl font-bold text-white">
          CAFM
        </h1>

        <p class="text-xs text-slate-400">
          Admin Dashboard
        </p>

      </div>

    </div>

    <button class="text-slate-400 hover:text-white">

      <lucide-icon
        [img]="Menu"
        class="w-5 h-5"
      >
      </lucide-icon>

    </button>

  </div>

  <!-- SEARCH -->
  <div class="px-4 py-4 border-b border-slate-800">

    <div class="relative">

      <lucide-icon
        [img]="Search"
        class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
      >
      </lucide-icon>

      <input
        type="text"
        placeholder="Search menu..."
        class="w-full bg-slate-800 border border-slate-700 rounded-xl pl-10 pr-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
      >

    </div>

  </div>

  <!-- MENU -->
  <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-2">

    <!-- DASHBOARD -->
    <a
      routerLink="/dashboard"
      routerLinkActive="bg-blue-600 text-white"
      class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all"
    >

      <lucide-icon
        [img]="LayoutDashboard"
        class="w-5 h-5"
      >
      </lucide-icon>

      <span class="font-medium">
        Dashboard
      </span>

    </a>

    <!-- ITEM MASTER -->
    <div>

      <button
        (click)="toggle('items')"
        class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-slate-800 transition-all"
      >

        <div class="flex items-center gap-3">

          <lucide-icon
            [img]="Boxes"
            class="w-5 h-5"
          >
          </lucide-icon>

          <span class="font-medium">
            Item Master
          </span>

        </div>

        <lucide-icon
          [img]="openMenu === 'items' ? ChevronUp : ChevronDown"
          class="w-4 h-4"
        >
        </lucide-icon>

      </button>

      <!-- SUBMENU -->
      <div
        *ngIf="openMenu === 'items'"
        class="ml-5 mt-2 border-l border-slate-700 pl-3 space-y-1"
      >

        <a
          routerLink="/item-master"
          routerLinkActive="bg-slate-800"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="List"
            class="w-4 h-4"
          >
          </lucide-icon>

          Item List

        </a>

        <a
          routerLink="/item-category"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="Folder"
            class="w-4 h-4"
          >
          </lucide-icon>

          Categories

        </a>

      </div>

    </div>

    <!-- STOREROOM -->
    <a
      routerLink="/storeroom"
      routerLinkActive="bg-blue-600 text-white"
      class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all"
    >

      <lucide-icon
        [img]="Warehouse"
        class="w-5 h-5"
      >
      </lucide-icon>

      <span class="font-medium">
        Store Room
      </span>

    </a>

    <!-- INVENTORY -->
    <div>

      <button
        (click)="toggle('inventory')"
        class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-slate-800 transition-all"
      >

        <div class="flex items-center gap-3">

          <lucide-icon
            [img]="PackageOpen"
            class="w-5 h-5"
          >
          </lucide-icon>

          <span class="font-medium">
            Inventory
          </span>

        </div>

        <lucide-icon
          [img]="openMenu === 'inventory' ? ChevronUp : ChevronDown"
          class="w-4 h-4"
        >
        </lucide-icon>

      </button>

      <!-- SUBMENU -->
      <div
        *ngIf="openMenu === 'inventory'"
        class="ml-5 mt-2 border-l border-slate-700 pl-3 space-y-1"
      >

        <a
          routerLink="/inventory"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="PlusCircle"
            class="w-4 h-4"
          >
          </lucide-icon>

          Add to Storeroom

        </a>

        <a
          routerLink="/inventory/issue-item"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="ArrowUpCircle"
            class="w-4 h-4"
          >
          </lucide-icon>

          Issue Item

        </a>

        <a
          routerLink="/inventory/return-item"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="Undo2"
            class="w-4 h-4"
          >
          </lucide-icon>

          Return Item

        </a>

        <a
          routerLink="/inventory/transfer-item"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="ArrowRightLeft"
            class="w-4 h-4"
          >
          </lucide-icon>

          Transfer Item

        </a>

        <a
          routerLink="/inventory/reorder"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="RefreshCcw"
            class="w-4 h-4"
          >
          </lucide-icon>

          Reorder

        </a>

        <a
          routerLink="/inventory/consignment"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="Truck"
            class="w-4 h-4"
          >
          </lucide-icon>

          Consignment

        </a>

      </div>

    </div>

    <!-- SERVICE -->
    <a
      routerLink="/service"
      routerLinkActive="bg-blue-600 text-white"
      class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all"
    >

      <lucide-icon
        [img]="Wrench"
        class="w-5 h-5"
      >
      </lucide-icon>

      <span class="font-medium">
        Service Master
      </span>

    </a>

    <!-- SETTINGS -->
    <div>

      <button
        (click)="toggle('settings')"
        class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-slate-800 transition-all"
      >

        <div class="flex items-center gap-3">

          <lucide-icon
            [img]="Settings"
            class="w-5 h-5"
          >
          </lucide-icon>

          <span class="font-medium">
            Settings
          </span>

        </div>

        <lucide-icon
          [img]="openMenu === 'settings' ? ChevronUp : ChevronDown"
          class="w-4 h-4"
        >
        </lucide-icon>

      </button>

      <!-- SETTINGS SUBMENU -->
      <div
        *ngIf="openMenu === 'settings'"
        class="ml-5 mt-2 border-l border-slate-700 pl-3 space-y-1"
      >

        <a
          routerLink="/company"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="Building2"
            class="w-4 h-4"
          >
          </lucide-icon>

          Company

        </a>

        <a
          routerLink="/user-details"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="Users"
            class="w-4 h-4"
          >
          </lucide-icon>

          User Details

        </a>

        <a
          routerLink="/role-permission"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="ShieldCheck"
            class="w-4 h-4"
          >
          </lucide-icon>

          Role & Permission

        </a>

        <a
          routerLink="/currency"
          class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 text-sm"
        >

          <lucide-icon
            [img]="BadgeDollarSign"
            class="w-4 h-4"
          >
          </lucide-icon>

          Currency

        </a>

      </div>

    </div>

  </nav>

  <!-- FOOTER -->
  <div class="border-t border-slate-800 p-4 bg-slate-950">

    <div class="flex items-center gap-3">

      <div class="w-11 h-11 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold">

        A

      </div>

      <div class="flex-1">

        <p class="text-sm font-semibold text-white">
          Admin User
        </p>

        <p class="text-xs text-slate-400">
          Super Admin
        </p>

      </div>

      <button class="text-slate-400 hover:text-white">

        <lucide-icon
          [img]="LogOut"
          class="w-4 h-4"
        >
        </lucide-icon>

      </button>

    </div>

  </div>

</div>
